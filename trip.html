<!DOCTYPE html>
<html>
 <Title>
    Conrad Sorge Travel Planner
 </Title>
<body>

<h2>Conrad Sorge Travel Planner</h2>

<form>
    <label for="caribbian">Caribbian</label>
    <input type ="checkbox" id="caribbian" value="True"> <br>

    <label for="mediterranean">Mediterranean</label>
    <input type ="checkbox" id="mediterranean" value = "True"> <br>

    <label for = "baltic">
        Baltic
    </label>
    <input type = "checkbox" id = "baltic" value = "False">
    <input type="button" onclick="choices()" 
    value="Cruise Choices">
</form>


<p id="result">Trip Selection will appear here</p>
<h3>
Trip Route
</h3>
<form>
    <label for = "startcity">
        Enter starting city
    </label>
    <input type = "text" id ="startcity" value = "athens">
    <label for = "endcity">
        Enter ending city
    </label>
    <input type = "text" id = "endcity">
    <input type = "button" value = "Update the trip" 
    onclick = updateTrip()>
</form>

<script> 
let my_trip = {};
function choices(){
    my_trip = {};
    my_trip.cari = document.getElementById("caribbian").checked;
    my_trip.medi = 
        document.getElementById("mediterranean").checked;
    my_trip.balt = document.getElementById("baltic").checked;
    document.getElementById("result").innerHTML = 
        JSON.stringify(my_trip);
}

function updateTrip(){
    let start = document.getElementById("startcity").value;
    let end = document.getElementById("endcity").value;
    my_trip["startcity"] = start;
    my_trip["endcity"] = end;
    document.getElementById("result").innerHTML = 
        JSON.stringify(my_trip);
}
</script>

</body>
</html>
