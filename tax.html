<!DOCTYPE html>
<html>
 <title>
    Your Name Tax Table Computation
 </title>
<body>

<h2>Conrad Sorge tax table computation</h2>

<form>
    <label for="Income">Enter Income </label>
    <input type ="number" id="Income" value="5000"> <br>

    <label for="BaseTaxRate">Enter the base tax rate </label>
    <input type ="number" id="BaseTaxRate" value = "0.05"
    step = "0.01"> <br>
    <label for = "CutOff">
        Enter the cut off
    </label>
    <input type = "number" id = "CutOff" value = "7500"><br>
    <label for = "ExtendedRate">
        Enter the extended rate
    </label>
    <input type = "number" id = "ExtendedRate" value = "0.15"
    step = "0.01">
    <input type="button" onclick="doTax()" 
    value="Show tax table">
</form>


<p id="result">This text will be replaced </p>

<script>
function doTax() {
    let income = Number(document.getElementById("Income").value);
    let cutoff = Number(document.getElementById("CutOff").value);
    let baseRate = Number(document.getElementById("BaseTaxRate").value);
    let extRate = Number(document.getElementById("ExtendedRate").value);
    let taxTable = "";
    for (let i = 1; i <= 5; i++) {
        let incomeLevel = i * income;
        let tax = 0;
        if (incomeLevel <= cutoff) {
            tax = incomeLevel * baseRate;
        } else {
            tax = (cutoff * baseRate) +
                  ((incomeLevel - cutoff) * extRate);
        }
        taxTable += "Income level " + incomeLevel +
                    " is " + tax + "; ";
    }
    document.getElementById("result").innerHTML =
        "Taxes are: " + taxTable;
}
</script>

<h2>
    Operations
</h2>
<form>
    <label>
        power
    </label> <br>
    <input type = "radio" name = "operation" value = "exponent"
    onclick = "chooseOp()">
    <label for>
        sum
    </label>
    <input type = "radio" name = "operation" value = "add" 
    onclick = "chooseOp()">
    <label>
        mod
    </label>
    <input type = "radio" name = "operation" value = "mod"
    onclick = "chooseOp()">
</form>
<p id = "opResult">
    Operation Result here
</p>
<script>
    function chooseOp(){
    let income = Number(document.getElementById("Income").value);
    let baseRate = Number(document.getElementById("BaseTaxRate").value);
    let operations = document.getElementsByName("operation");
    let result;
    for (let i = 0; i < operations.length; i++){
        if (operations[i].checked){
            if (operations[i].value == "exponent"){
                result = income ** baseRate;
                document.getElementById("opResult").innerHTML =
                    income + " ^ " + baseRate + " = " + result;
            }
            if (operations[i].value == "add"){
                result = income + baseRate;
                document.getElementById("opResult").innerHTML =
                    income + " + " + baseRate + " = " + result;
            }
            if (operations[i].value == "mod"){
                result = income % baseRate;
                document.getElementById("opResult").innerHTML =
                    income + " % " + baseRate + " = " + result;
            }
        }
    }
}
</script>
</body>
</html>
